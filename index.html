<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Error</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Tahoma", "MS Sans Serif", sans-serif;
      background: #d9d9d9;
      cursor: default;
    }

    body {
      position: relative;
    }

    .screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #d9d9d9;
      transition: filter 2.2s ease, opacity 2.2s ease, background 2.2s ease;
    }

    .window {
      position: absolute;
      background: #c0c0c0;
      border: 2px solid #ffffff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      box-shadow: 2px 2px 0 #000;
    }

    .title-bar {
      height: 28px;
      background: linear-gradient(90deg, #0a2c9c, #2a9df4);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px 0 8px;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.2px;
    }

    .title-close {
      width: 20px;
      height: 20px;
      background: #c0c0c0;
      color: black;
      border: 1px solid #fff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      line-height: 1;
    }

    .content {
      padding: 26px 20px 20px;
    }

    .message-row {
      display: flex;
      align-items: flex-start;
      gap: 18px;
    }

    .error-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: red;
      position: relative;
      flex-shrink: 0;
      margin-top: 4px;
      box-shadow: inset 0 0 0 2px #ff4d4d;
    }

    .error-icon::before,
    .error-icon::after {
      content: "";
      position: absolute;
      top: 18px;
      left: 8px;
      width: 24px;
      height: 4px;
      background: white;
      border-radius: 2px;
      transform-origin: center;
    }

    .error-icon::before {
      transform: rotate(45deg);
    }

    .error-icon::after {
      transform: rotate(-45deg);
    }

    .message-text {
      font-size: 16px;
      color: #111;
      line-height: 1.4;
      white-space: pre-line;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 26px;
      margin-top: 26px;
    }

    .btn {
      min-width: 120px;
      padding: 8px 18px;
      background: #c0c0c0;
      border: 2px solid #fff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      font-size: 15px;
      text-align: center;
    }

    .center-window {
      width: 440px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
    }

    .popup {
      width: 320px;
      z-index: 10;
    }

    .popup .content {
      padding: 18px 16px 16px;
    }

    .popup .message-text {
      font-size: 15px;
    }

    .popup .buttons {
      margin-top: 18px;
      gap: 14px;
    }

    .popup .btn {
      min-width: 95px;
      padding: 7px 12px;
      font-size: 14px;
    }

    .hint {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      color: #555;
      font-size: 14px;
      opacity: 0.95;
      text-align: center;
      z-index: 6;
    }

    .reset-overlay {
      position: absolute;
      inset: 0;
      background: rgba(217, 217, 217, 0.96);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .reset-box {
      width: min(560px, 88vw);
      background: #c0c0c0;
      border: 2px solid #ffffff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      box-shadow: 2px 2px 0 #000;
    }

    .reset-content {
      padding: 24px 24px 28px;
    }

    .reset-title {
      font-size: 22px;
      font-weight: bold;
      color: #111;
      margin-bottom: 16px;
    }

    .reset-subtitle {
      font-size: 15px;
      color: #222;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .progress-outer {
      width: 100%;
      height: 30px;
      background: #b7b7b7;
      border: 2px solid #fff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      padding: 2px;
    }

    .progress-inner {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #0a2c9c, #2a9df4);
      transition: width 0.08s linear;
    }

    .progress-label {
      margin-top: 12px;
      font-size: 15px;
      color: #111;
      text-align: right;
    }

    .blackout {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 400;
      transition: opacity 3.5s ease;
    }

    .joke-final {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #000;
      color: #fff;
      font-weight: 900;
      font-size: clamp(28px, 5vw, 72px);
      letter-spacing: 1px;
      opacity: 0;
      z-index: 500;
      transition: opacity 1.8s ease;
      padding: 30px;
    }
  </style>
</head>
<body>
  <div class="screen" id="screen">
    <div class="window center-window" id="mainWindow">
      <div class="title-bar">
        <span>System Error</span>
        <div class="title-close">×</div>
      </div>
      <div class="content">
        <div class="message-row">
          <div class="error-icon"></div>
          <div class="message-text">Runtime error.
Press Ok to Continue.
Press Cancel to Quit.</div>
        </div>
        <div class="buttons">
          <div class="btn">OK</div>
          <div class="btn">Cancel</div>
        </div>
      </div>
    </div>

    <div class="hint" id="hint">Esperando respuesta del sistema...</div>

    <div class="reset-overlay" id="resetOverlay">
      <div class="reset-box">
        <div class="title-bar">
          <span>System Recovery</span>
          <div class="title-close">×</div>
        </div>
        <div class="reset-content">
          <div class="reset-title">Error reseteando el dispositivo</div>
          <div class="reset-subtitle">
            El sistema está intentando restaurar los servicios críticos.
            No apagues el dispositivo.
          </div>
          <div class="progress-outer">
            <div class="progress-inner" id="progressInner"></div>
          </div>
          <div class="progress-label" id="progressLabel">0%</div>
        </div>
      </div>
    </div>

    <div class="blackout" id="blackout"></div>
    <div class="joke-final" id="jokeFinal">ERA UNA BROMA JA JA JA😎🎞️🤣</div>
  </div>

  <script>
    const screen = document.getElementById("screen");
    const hint = document.getElementById("hint");
    const resetOverlay = document.getElementById("resetOverlay");
    const progressInner = document.getElementById("progressInner");
    const progressLabel = document.getElementById("progressLabel");
    const blackout = document.getElementById("blackout");
    const jokeFinal = document.getElementById("jokeFinal");

    const popups = [];
    let popupSpawner = null;
    let popupAnimationRunning = true;
    let popupCount = 0;
    let chaosEnded = false;

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function createPopup() {
      if (chaosEnded) return;

      const popup = document.createElement("div");
      popup.className = "window popup";
      popup.innerHTML = `
        <div class="title-bar">
          <span>System Error</span>
          <div class="title-close">×</div>
        </div>
        <div class="content">
          <div class="message-row">
            <div class="error-icon"></div>
            <div class="message-text">Critical exception detected.
Unable to close this window.</div>
          </div>
          <div class="buttons">
            <div class="btn fake-close">OK</div>
            <div class="btn fake-close">Cancel</div>
          </div>
        </div>
      `;

      const width = 320;
      const height = 170;

      popup.style.left = `${randomBetween(10, Math.max(20, window.innerWidth - width - 10))}px`;
      popup.style.top = `${randomBetween(10, Math.max(20, window.innerHeight - height - 10))}px`;

      const state = {
        el: popup,
        vx: randomBetween(-2.8, 2.8) || 2,
        vy: randomBetween(-2.8, 2.8) || -2
      };

      popups.push(state);
      screen.appendChild(popup);
      popupCount++;

      attachEscapeBehavior(state);
    }

    function movePopupAway(state, mouseX, mouseY) {
      const rect = state.el.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      let dx = cx - mouseX;
      let dy = cy - mouseY;
      const dist = Math.hypot(dx, dy) || 1;

      dx /= dist;
      dy /= dist;

      let nextLeft = rect.left + dx * 90;
      let nextTop = rect.top + dy * 90;

      nextLeft = clamp(nextLeft, 0, window.innerWidth - rect.width);
      nextTop = clamp(nextTop, 0, window.innerHeight - rect.height);

      state.el.style.left = `${nextLeft}px`;
      state.el.style.top = `${nextTop}px`;

      state.vx = dx * randomBetween(1.8, 3.8);
      state.vy = dy * randomBetween(1.8, 3.8);
    }

    function attachEscapeBehavior(state) {
      const popup = state.el;

      popup.addEventListener("mousemove", (e) => {
        const rect = popup.getBoundingClientRect();
        const localX = e.clientX - rect.left;
        const localY = e.clientY - rect.top;

        const nearClose = localX > rect.width - 90 && localY < 55;
        const nearButtons = localY > rect.height - 70;

        if (nearClose || nearButtons) {
          movePopupAway(state, e.clientX, e.clientY);
        }
      });

      popup.addEventListener("mouseenter", (e) => {
        movePopupAway(state, e.clientX, e.clientY);
      });

      popup.querySelectorAll(".title-close, .fake-close").forEach((btn) => {
        btn.addEventListener("mouseenter", (e) => {
          movePopupAway(state, e.clientX, e.clientY);
        });

        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          movePopupAway(state, e.clientX, e.clientY);

          if (!chaosEnded && popupCount < 40) {
            createPopup();
          }
        });
      });
    }

    function animatePopups() {
      if (!popupAnimationRunning) return;

      for (const state of popups) {
        if (!state.el.isConnected) continue;

        const rect = state.el.getBoundingClientRect();
        let left = rect.left + state.vx;
        let top = rect.top + state.vy;

        if (left <= 0 || left >= window.innerWidth - rect.width) {
          state.vx *= -1;
          left = clamp(left, 0, window.innerWidth - rect.width);
        }

        if (top <= 0 || top >= window.innerHeight - rect.height) {
          state.vy *= -1;
          top = clamp(top, 0, window.innerHeight - rect.height);
        }

        state.el.style.left = `${left}px`;
        state.el.style.top = `${top}px`;
      }

      requestAnimationFrame(animatePopups);
    }

    function startChaos() {
      hint.textContent = "Error crítico detectado...";
      createPopup();
      createPopup();
      createPopup();

      popupSpawner = setInterval(() => {
        if (popupCount < 24 && !chaosEnded) {
          createPopup();
        }
      }, 900);
    }

    function endChaosAndStartReset() {
      chaosEnded = true;
      hint.textContent = "Restaurando sistema...";
      if (popupSpawner) clearInterval(popupSpawner);

      resetOverlay.style.display = "flex";
      startProgressBar();
    }

    function startProgressBar() {
      const duration = 7000;
      const start = performance.now();

      function step(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const percent = Math.round(progress * 100);

        progressInner.style.width = `${percent}%`;
        progressLabel.textContent = `${percent}%`;

        if (progress < 1) {
          requestAnimationFrame(step);
        } else {
          startFadeToBlack();
        }
      }

      requestAnimationFrame(step);
    }

    function startFadeToBlack() {
      screen.style.filter = "blur(10px) brightness(0.25)";
      blackout.style.opacity = "1";

      setTimeout(() => {
        jokeFinal.style.opacity = "1";
      }, 3300);
    }

    window.addEventListener("resize", () => {
      for (const state of popups) {
        if (!state.el.isConnected) continue;
        const rect = state.el.getBoundingClientRect();
        state.el.style.left = `${clamp(rect.left, 0, window.innerWidth - rect.width)}px`;
        state.el.style.top = `${clamp(rect.top, 0, window.innerHeight - rect.height)}px`;
      }
    });

    animatePopups();

    // 0-10s: error principal
    // 10-20s: caos con avisos
    // 20s: reset + barra 7s
    setTimeout(startChaos, 10000);
    setTimeout(endChaosAndStartReset, 20000);
  </script>
</body>
</html>
