<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>System Error</title>
  <style>
    :root {
      --bg: #d9d9d9;
      --window: #cfcfcf;
      --border-dark: #555;
      --border-light: #fff;
      --title1: #0d2f97;
      --title2: #2e90d8;
      --text: #111;
      --danger: #d00000;
      --shadow: rgba(0,0,0,0.18);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: manipulation;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Tahoma", "MS Sans Serif", Arial, sans-serif;
      background: var(--bg);
    }

    body.fade-black {
      animation: toBlack 2.2s forwards;
    }

    @keyframes toBlack {
      0% { background: var(--bg); }
      100% { background: #000; }
    }

    .screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .center-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .win98 {
      width: min(92vw, 520px);
      background: var(--window);
      border-top: 2px solid var(--border-light);
      border-left: 2px solid var(--border-light);
      border-right: 2px solid var(--border-dark);
      border-bottom: 2px solid var(--border-dark);
      box-shadow: 0 10px 24px var(--shadow);
    }

    .titlebar {
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      font-size: 15px;
      font-weight: 700;
      padding: 0 6px 0 8px;
      background: linear-gradient(90deg, var(--title1), var(--title2));
    }

    .titlebar .close {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
      background: #d7d7d7;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #444;
      border-bottom: 2px solid #444;
      font-size: 14px;
      line-height: 1;
      font-weight: 700;
    }

    .content {
      padding: 18px 16px 14px;
      color: var(--text);
      font-size: 16px;
    }

    .error-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .error-icon {
      width: 44px;
      height: 44px;
      flex: 0 0 44px;
      border-radius: 50%;
      background: #f00;
      position: relative;
      margin-top: 2px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.2);
    }

    .error-icon::before,
    .error-icon::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24px;
      height: 4px;
      background: white;
      border-radius: 2px;
      transform-origin: center;
    }

    .error-icon::before {
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .error-icon::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    .error-text {
      line-height: 1.45;
      font-size: 17px;
      margin-top: 1px;
      white-space: pre-line;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 22px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .btn98 {
      min-width: 110px;
      height: 38px;
      padding: 0 16px;
      background: #d7d7d7;
      color: #111;
      font-size: 16px;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #444;
      border-bottom: 2px solid #444;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .btn98:active {
      border-top: 2px solid #444;
      border-left: 2px solid #444;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
    }

    .floating-area {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: auto;
    }

    .float-win {
      position: absolute;
      width: 180px;
      background: var(--window);
      border-top: 2px solid var(--border-light);
      border-left: 2px solid var(--border-light);
      border-right: 2px solid var(--border-dark);
      border-bottom: 2px solid var(--border-dark);
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
      transform: translate(0, 0);
    }

    .float-win .titlebar {
      height: 24px;
      font-size: 12px;
      padding-left: 6px;
    }

    .float-win .titlebar .close {
      width: 18px;
      height: 18px;
      font-size: 11px;
    }

    .float-win .content {
      padding: 10px;
      font-size: 12px;
    }

    .float-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .float-win .error-icon {
      width: 24px;
      height: 24px;
      flex-basis: 24px;
    }

    .float-win .error-icon::before,
    .float-win .error-icon::after {
      width: 12px;
      height: 2px;
    }

    .process-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.10);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 50;
    }

    .process-overlay.show {
      display: flex;
    }

    .process-box {
      width: min(92vw, 520px);
      background: var(--window);
      border-top: 2px solid var(--border-light);
      border-left: 2px solid var(--border-light);
      border-right: 2px solid var(--border-dark);
      border-bottom: 2px solid var(--border-dark);
      box-shadow: 0 10px 24px rgba(0,0,0,0.28);
    }

    .process-box .content {
      padding: 18px 16px 16px;
    }

    .process-title {
      font-size: 19px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .task-list {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 15px;
    }

    .task {
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.45;
      transition: opacity .25s ease, transform .25s ease;
    }

    .task.active,
    .task.done {
      opacity: 1;
    }

    .task.active {
      transform: translateX(3px);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #777;
      flex: 0 0 10px;
    }

    .task.active .dot {
      background: #1d7c1d;
      animation: pulse 0.7s infinite;
    }

    .task.done .dot {
      background: #1d7c1d;
      animation: none;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.35); opacity: 0.55; }
      100% { transform: scale(1); opacity: 1; }
    }

    .progress-wrap {
      margin-top: 12px;
    }

    .progress-label {
      font-size: 14px;
      margin-bottom: 8px;
    }

    .progress-bar {
      width: 100%;
      height: 24px;
      background: #f2f2f2;
      border-top: 2px solid #444;
      border-left: 2px solid #444;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0a52cc, #40a9ff);
      transition: width 0.2s linear;
    }

    .final-message {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      z-index: 200;
      padding: 24px;
      background: rgba(0,0,0,0.94);
    }

    .final-message.show {
      display: flex;
      animation: finalIn 0.7s ease forwards;
    }

    @keyframes finalIn {
      from {
        opacity: 0;
        transform: scale(1.03);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .final-message .big {
      font-size: clamp(26px, 8vw, 54px);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .shake {
      animation: shake 0.18s linear 8;
    }

    @keyframes shake {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-2px, 2px); }
      50% { transform: translate(2px, -2px); }
      75% { transform: translate(-2px, -1px); }
      100% { transform: translate(0, 0); }
    }

    @media (max-width: 480px) {
      .content {
        font-size: 15px;
      }

      .error-text {
        font-size: 15px;
      }

      .btn98 {
        min-width: 96px;
        height: 36px;
        font-size: 15px;
      }

      .process-title {
        font-size: 17px;
      }

      .task-list {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="screen" id="screen">
    <div class="center-wrap" id="initialWrap">
      <div class="win98" id="initialError">
        <div class="titlebar">
          <span>System Error</span>
          <div class="close">×</div>
        </div>
        <div class="content">
          <div class="error-row">
            <div class="error-icon"></div>
            <div class="error-text">Runtime error.
Press Ok to continue.
Press Cancel to quit.</div>
          </div>
          <div class="buttons">
            <div class="btn98" id="okBtn">OK</div>
            <div class="btn98" id="cancelBtn">Cancel</div>
          </div>
        </div>
      </div>
    </div>

    <div class="floating-area" id="floatingArea"></div>

    <div class="process-overlay" id="processOverlay">
      <div class="process-box">
        <div class="titlebar">
          <span>System Error</span>
          <div class="close">×</div>
        </div>
        <div class="content">
          <div class="process-title">ERROR RESETEANDO EL EQUIPO</div>

          <div class="task-list">
            <div class="task" data-step="0"><span class="dot"></span><span>reseteando el equipo</span></div>
            <div class="task" data-step="1"><span class="dot"></span><span>limpiando el equipo</span></div>
            <div class="task" data-step="2"><span class="dot"></span><span>rastreando IP</span></div>
            <div class="task" data-step="3"><span class="dot"></span><span>borrando recursos</span></div>
          </div>

          <div class="progress-wrap">
            <div class="progress-label">Cargando proceso...</div>
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="final-message" id="finalMessage">
    🤣🤣🤣🤣🤣🤣</div>
    </div>
  </div>

  <script>
    const initialWrap = document.getElementById("initialWrap");
    const floatingArea = document.getElementById("floatingArea");
    const processOverlay = document.getElementById("processOverlay");
    const progressFill = document.getElementById("progressFill");
    const finalMessage = document.getElementById("finalMessage");
    const screen = document.getElementById("screen");
    const tasks = [...document.querySelectorAll(".task")];

    const MAX_FLOATS = 14;
    const floatWindows = [];
    let prankStarted = false;
    let floatingPhase = false;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createFloatingWindow(index) {
      const win = document.createElement("div");
      win.className = "float-win";

      win.innerHTML = `
        <div class="titlebar">
          <span>System Error</span>
          <div class="close">×</div>
        </div>
        <div class="content">
          <div class="float-row">
            <div class="error-icon"></div>
            <div>Runtime error</div>
          </div>
        </div>
      `;

      const rectW = Math.min(180, window.innerWidth * 0.45);
      const rectH = 82;

      let x = random(8, Math.max(10, window.innerWidth - rectW - 8));
      let y = random(8, Math.max(10, window.innerHeight - rectH - 8));

      win.style.width = rectW + "px";
      win.style.left = x + "px";
      win.style.top = y + "px";

      const obj = {
        el: win,
        x,
        y,
        w: rectW,
        h: rectH,
        vx: random(-1.4, 1.4) || 1,
        vy: random(-1.4, 1.4) || -1
      };

      floatingArea.appendChild(win);
      floatWindows.push(obj);

      win.addEventListener("click", (e) => {
        e.stopPropagation();
        evadeFromPoint(e.touches?.[0]?.clientX || e.clientX, e.touches?.[0]?.clientY || e.clientY, 160);
      });

      win.addEventListener("touchstart", (e) => {
        const t = e.touches[0];
        if (!t) return;
        evadeFromPoint(t.clientX, t.clientY, 180);
      }, { passive: true });
    }

    function animateFloaters() {
      if (!floatingPhase) return;

      const W = window.innerWidth;
      const H = window.innerHeight;

      for (const obj of floatWindows) {
        obj.x += obj.vx;
        obj.y += obj.vy;

        if (obj.x <= 0 || obj.x + obj.w >= W) obj.vx *= -1;
        if (obj.y <= 0 || obj.y + obj.h >= H) obj.vy *= -1;

        obj.x = clamp(obj.x, 0, W - obj.w);
        obj.y = clamp(obj.y, 0, H - obj.h);

        obj.el.style.left = obj.x + "px";
        obj.el.style.top = obj.y + "px";
      }

      requestAnimationFrame(animateFloaters);
    }

    function evadeFromPoint(px, py, extraForce = 140) {
      for (const obj of floatWindows) {
        const cx = obj.x + obj.w / 2;
        const cy = obj.y + obj.h / 2;

        const dx = cx - px;
        const dy = cy - py;
        const dist = Math.hypot(dx, dy);

        if (dist < 180) {
          const force = (180 - dist) / 180;
          const nx = dx / (dist || 1);
          const ny = dy / (dist || 1);

          obj.vx += nx * force * 4;
          obj.vy += ny * force * 4;

          const speedLimit = 7;
          obj.vx = clamp(obj.vx, -speedLimit, speedLimit);
          obj.vy = clamp(obj.vy, -speedLimit, speedLimit);

          obj.x += nx * force * (extraForce * 0.05);
          obj.y += ny * force * (extraForce * 0.05);
        }
      }
    }

    function startFloatingPhase() {
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      floatingPhase = true;
      initialWrap.style.display = "none";

      for (let i = 0; i < MAX_FLOATS; i++) {
        setTimeout(() => createFloatingWindow(i), i * 120);
      }

      setTimeout(() => {
        animateFloaters();
      }, 200);

      setTimeout(() => {
        showProcessPhase();
      }, 7000);
    }

    function setActiveTask(index) {
      tasks.forEach((task, i) => {
        task.classList.remove("active");
        if (i < index) task.classList.add("done");
        if (i >= index) task.classList.remove("done");
      });

      if (tasks[index]) {
        tasks[index].classList.add("active");
      }
    }

    function showProcessPhase() {
      floatingPhase = false;

      floatWindows.forEach(w => w.el.remove());
      floatWindows.length = 0;

      processOverlay.classList.add("show");
      if (navigator.vibrate) navigator.vibrate([300, 150, 300, 150, 500]);
      screen.classList.add("shake");

      setTimeout(() => {
        screen.classList.remove("shake");
      }, 1600);

      let progress = 0;
      let currentStep = 0;

      setActiveTask(0);

     const totalDuration = 15000; // 15 segundos
const intervalTime = 100; // cada cuánto actualiza (ms)
const increment = 100 / (totalDuration / intervalTime);

const interval = setInterval(() => {
  progress += increment;
  if (navigator.vibrate && Math.random() > 0.7) {
  navigator.vibrate(50);
}
        if (progress > 100) progress = 100;

        progressFill.style.width = progress + "%";

        if (progress >= 25 && currentStep < 1) {
          currentStep = 1;
          setActiveTask(1);
        }
        if (progress >= 50 && currentStep < 2) {
          currentStep = 2;
          setActiveTask(2);
        }
        if (progress >= 75 && currentStep < 3) {
          currentStep = 3;
          setActiveTask(3);
        }

        if (progress >= 100) {
          clearInterval(interval);
          tasks.forEach(t => {
            t.classList.remove("active");
            t.classList.add("done");
          });

          setTimeout(() => {
            document.body.classList.add("fade-black");
          }, 400);

          setTimeout(() => {
            processOverlay.style.display = "none";
            if (navigator.vibrate) navigator.vibrate([1000, 200, 1000, 200, 1500]);
            finalMessage.classList.add("show");
          }, 2400);
        }
    }, intervalTime);
    }

    function startPrank() {
      if (prankStarted) return;
      prankStarted = true;

      setTimeout(() => {
        startFloatingPhase();
      }, 6000);
    }

    document.getElementById("okBtn").addEventListener("click", startPrank);
    document.getElementById("cancelBtn").addEventListener("click", startPrank);

    document.body.addEventListener("touchstart", (e) => {
      if (!floatingPhase) return;
      const t = e.touches[0];
      if (!t) return;
      evadeFromPoint(t.clientX, t.clientY, 220);
    }, { passive: true });

    document.body.addEventListener("touchmove", (e) => {
      if (!floatingPhase) return;
      const t = e.touches[0];
      if (!t) return;
      evadeFromPoint(t.clientX, t.clientY, 260);
    }, { passive: true });

    document.body.addEventListener("mousemove", (e) => {
      if (!floatingPhase) return;
      evadeFromPoint(e.clientX, e.clientY, 120);
    });

    // Arranca automáticamente aunque no toquen nada
    startPrank();

    window.addEventListener("resize", () => {
      const W = window.innerWidth;
      const H = window.innerHeight;

      floatWindows.forEach(obj => {
        obj.w = Math.min(180, W * 0.45);
        obj.el.style.width = obj.w + "px";
        obj.x = clamp(obj.x, 0, W - obj.w);
        obj.y = clamp(obj.y, 0, H - obj.h);
        obj.el.style.left = obj.x + "px";
        obj.el.style.top = obj.y + "px";
      });
    });
  </script>
</body>
</html>
